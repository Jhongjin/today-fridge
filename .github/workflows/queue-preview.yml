name: Queue Preview

on:
  push:
    branches:
      - main
      - "queue/**"
      - "codex/**"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  BUNDLE_BUDGET_BYTES: ${{ vars.BUNDLE_BUDGET_BYTES }}

jobs:
  validate:
    name: Validate Harness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify command-center files
        run: |
          test -f docs/strategy/STRATEGY_LOCK.md
          test -f docs/design/GAME_SYSTEMS.md
          test -f docs/design/RETENTION_ECONOMY.md
          test -f docs/creative/UX_AUDIO_VISUAL.md
          test -f docs/platform/TOSS_QA_HARNESS.md
          test -f harness/COMMAND_CENTER.md
          test -f harness/REVIEW_GATES.md

      - name: Setup Node when app exists
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install app dependencies
        if: hashFiles('package.json') != ''
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run unit tests
        if: hashFiles('package.json') != ''
        run: npm test --if-present

      - name: Check Korean copy
        if: hashFiles('package.json') != ''
        run: npm run qa:korean-copy -- --github-summary

      - name: Build app
        if: hashFiles('package.json') != ''
        run: npm run build --if-present

      - name: Check bundle budget
        if: hashFiles('package.json') != ''
        run: npm run check:bundle -- --github-summary

      - name: Install Playwright Chromium
        if: hashFiles('package.json') != ''
        run: npx playwright install --with-deps chromium

      - name: Capture console assets
        if: hashFiles('package.json') != ''
        run: npm run qa:console-assets -- --github-summary

      - name: Run browser tests
        if: hashFiles('package.json') != ''
        run: npm run test:e2e --if-present

      - name: Skip app checks when no app exists
        if: hashFiles('package.json') == ''
        run: |
          echo "No package.json yet; harness-only validation passed."

  preview:
    name: Optional Preview Deploy
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node for deployment preflight
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Check deployment prerequisites
        id: deploy_gate
        env:
          AUTO_DEPLOY_ENABLED: ${{ vars.AUTO_DEPLOY_ENABLED }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npm run deploy:check-prereqs -- --github-summary

      - name: Install Vercel CLI
        if: steps.deploy_gate.outputs.enabled == 'true'
        env:
          VERCEL_CLI_VERSION: ${{ vars.VERCEL_CLI_VERSION }}
        run: npm install -g "vercel@${VERCEL_CLI_VERSION:-latest}"

      - name: Pull Vercel preview environment
        if: steps.deploy_gate.outputs.enabled == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Deploy preview
        if: steps.deploy_gate.outputs.enabled == 'true'
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -f package.json ]; then
            vercel build --token="$VERCEL_TOKEN"
            vercel deploy --prebuilt --token="$VERCEL_TOKEN" > deployment-url.txt
          else
            vercel deploy --token="$VERCEL_TOKEN" > deployment-url.txt
          fi
          url="$(tail -n 1 deployment-url.txt)"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          {
            echo "### Preview deploy"
            echo ""
            echo "- URL: $url"
            echo "- Commit: $GITHUB_SHA"
          } >> "$GITHUB_STEP_SUMMARY"
