name: Commander Production Deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy"
        required: true
        default: "main"
      preview_url:
        description: "Optional preview URL to promote instead of rebuilding"
        required: false
        default: ""

permissions:
  contents: read
  deployments: write

jobs:
  commander-approval:
    name: Commander Approval
    runs-on: ubuntu-latest
    environment: commander-production
    steps:
      - name: Approval recorded
        run: echo "Commander production approval gate passed."

  production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: commander-approval

    steps:
      - name: Checkout approved ref
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Verify Vercel credentials
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          test -n "$VERCEL_TOKEN"
          test -n "$VERCEL_ORG_ID"
          test -n "$VERCEL_PROJECT_ID"

      - name: Install Vercel CLI
        env:
          VERCEL_CLI_VERSION: ${{ vars.VERCEL_CLI_VERSION }}
        run: npm install -g "vercel@${VERCEL_CLI_VERSION:-latest}"

      - name: Promote preview or deploy production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PREVIEW_URL: ${{ inputs.preview_url }}
        run: |
          if [ -n "$PREVIEW_URL" ]; then
            vercel promote "$PREVIEW_URL" --yes --token="$VERCEL_TOKEN"
            {
              echo "### Production promoted"
              echo ""
              echo "- Preview URL: $PREVIEW_URL"
              echo "- Ref: ${{ inputs.ref }}"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
            if [ -f package.json ]; then
              vercel build --prod --token="$VERCEL_TOKEN"
              vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" > deployment-url.txt
            else
              vercel deploy --prod --token="$VERCEL_TOKEN" > deployment-url.txt
            fi
            url="$(tail -n 1 deployment-url.txt)"
            {
              echo "### Production deploy"
              echo ""
              echo "- URL: $url"
              echo "- Ref: ${{ inputs.ref }}"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
